<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

.tv-card {
    position: relative;
    width: 1280px;
    height: 720px;
    background: url('file://{{ASSETS_DIR}}/bg_stadium.png') center/cover no-repeat;
    overflow: hidden;
}

/* Dark overlay */
.tv-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(1,10,25,0.15), rgba(1,10,25,0.55));
    z-index: 1;
}

/* Noise overlay */
.noise-overlay {
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/noise_overlay.png') center/cover no-repeat;
    opacity: 0.08;
    mix-blend-mode: overlay;
    z-index: 2;
    pointer-events: none;
}

/* Panel */
.panel {
    position: absolute;
    inset: 45px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index: 3;
    display: flex;
    flex-direction: column;
}

/* Panel background image */
.panel-bg {
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/panel_main.png') center/cover no-repeat;
    opacity: 0.12;
    border-radius: 28px;
    pointer-events: none;
}

/* Top bar */
.top-bar {
    margin: 26px 26px 0;
    height: 86px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    z-index: 4;
}

/* Header bar image overlay */
.top-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/header_bar.png') center/cover no-repeat;
    opacity: 0.15;
    border-radius: 18px;
    pointer-events: none;
}

/* TV badge */
.tv-badge {
    width: 340px;
    height: 100%;
    background: linear-gradient(135deg, #08794f, #12f2a3);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0;
    text-shadow: 0 0 30px rgba(18,242,163,0.4);
    position: relative;
    overflow: hidden;
    z-index: 5;
}

.tv-badge::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    border-radius: 18px;
}

/* Accent line under badge */
.accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: url('file://{{ASSETS_DIR}}/accent_line.png') center/cover no-repeat;
    opacity: 0.6;
}

/* Date */
.date {
    flex: 1;
    text-align: left;
    font-size: 34px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    z-index: 5;
    padding: 0 24px;
    margin-left: 34px;
}

/* Sport filter pill */
.sport-pill {
    margin-right: 20px;
    padding: 8px 28px;
    background: rgba(18, 242, 163, 0.15);
    border: 1px solid rgba(18, 242, 163, 0.3);
    border-radius: 14px;
    font-size: 22px;
    font-weight: 700;
    color: #12f2a3;
    letter-spacing: 1px;
    z-index: 5;
    flex-shrink: 0;
}

/* Channel list */
.channel-list {
    flex: 1;
    overflow: hidden;
    padding: 16px 26px 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 4;
}

/* Channel row */
.channel-row {
    display: flex;
    align-items: stretch;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    flex-shrink: 0;
}

/* Channel name sidebar */
.channel-name {
    width: 220px;
    min-width: 220px;
    background: rgba(18, 242, 163, 0.08);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 12px;
    gap: 4px;
}

.channel-logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: contain;
}

.channel-logo-placeholder {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: rgba(18, 242, 163, 0.15);
    border: 1px solid rgba(18, 242, 163, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    color: #12f2a3;
}

.channel-label {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    text-align: center;
    line-height: 1.2;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Events area */
.channel-events {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8px 16px;
    gap: 2px;
}

/* Event row */
.event-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
}

.event-time {
    font-size: 18px;
    font-weight: 800;
    color: #12f2a3;
    min-width: 52px;
    flex-shrink: 0;
}

.event-teams {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.event-league {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    flex-shrink: 0;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Fixture-style event row with team badges */
.fixture-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
}

.fixture-team {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
}

.fixture-team.away {
    justify-content: flex-start;
}

.fixture-vs {
    font-size: 14px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.4);
    flex-shrink: 0;
    padding: 0 2px;
}

.team-badge {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    object-fit: contain;
    flex-shrink: 0;
}

.team-badge-placeholder {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: rgba(18, 242, 163, 0.12);
    border: 1px solid rgba(18, 242, 163, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    color: #12f2a3;
    flex-shrink: 0;
}

.team-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.no-events {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.3);
    font-style: italic;
}

/* Footer */
.footer {
    margin: 0 26px 26px;
    padding: 12px 24px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
    z-index: 4;
}

.footer-text {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
}

.footer-accent {
    color: #12f2a3;
    font-weight: 700;
}
</style>
</head>
<body>
<div class="tv-card">
    <div class="noise-overlay"></div>
    <div class="panel">
        <div class="panel-bg"></div>
        <div class="top-bar">
            <div class="tv-badge">TV GUIDE<div class="accent-line"></div></div>
            <div class="date">{{DATE_LABEL}}</div>
            <div class="sport-pill">{{SPORT_LABEL}}</div>
        </div>

        <div class="channel-list">
            {{CHANNEL_ROWS}}
        </div>

        <div class="footer">
            <div class="footer-text"><span class="footer-accent">{{EVENT_COUNT}}</span> events across <span class="footer-accent">{{CHANNEL_COUNT}}</span> channels</div>
        </div>
    </div>
</div>
</body>
</html>

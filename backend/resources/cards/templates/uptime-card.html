<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 400px; }
.card { width: 600px; padding: 32px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.indicator { width: 12px; height: 12px; border-radius: 50%; background: #22c55e; }
.indicator.down { background: #ef4444; }
.top h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.top .time { margin-left: auto; font-size: 13px; color: #64748b; }
.row { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid #1e293b; }
.row:last-child { border-bottom: none; }
.row .name { font-size: 16px; font-weight: 600; color: #f1f5f9; flex: 1; }
.badge { font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 12px; }
.badge.up { background: rgba(34,197,94,.12); color: #22c55e; }
.badge.down { background: rgba(239,68,68,.12); color: #ef4444; }
.status-line { font-size: 14px; color: #64748b; margin-bottom: 24px; }
.status-line .up { color: #22c55e; }
.status-line .down { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <span class="indicator {{STATUS_CLASS}}"></span>
    <h1>Uptime</h1>
    <div class="time">{{DATE}}</div>
  </div>
  <div class="status-line">{{STATUS_MSG}}</div>
  {{SERVICES}}
</div>
</body>
</html>

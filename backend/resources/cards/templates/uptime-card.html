<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0b1120;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 400px;
}

.card {
  width: 560px;
  padding: 40px;
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 24px;
}

.icon-wrap {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.icon-wrap.up {
  background: rgba(34, 197, 94, 0.1);
}

.icon-wrap.down {
  background: rgba(239, 68, 68, 0.1);
}

.icon-wrap svg {
  width: 28px;
  height: 28px;
}

.status {
  font-size: 22px;
  font-weight: 700;
  color: #f1f5f9;
  margin-bottom: 6px;
}

.msg {
  font-size: 15px;
  color: #64748b;
  margin-bottom: 28px;
  line-height: 1.5;
}

.msg .highlight-green {
  color: #22c55e;
  font-weight: 600;
}

.msg .highlight-red {
  color: #ef4444;
  font-weight: 600;
}

.details {
  background: #0f172a;
  border: 1px solid #1e293b;
  border-radius: 14px;
  padding: 16px 20px;
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}

.row + .row {
  border-top: 1px solid #1e293b;
}

.site-name {
  font-size: 15px;
  font-weight: 600;
  color: #f1f5f9;
}

.status-badge {
  font-size: 13px;
  font-weight: 600;
  padding: 4px 14px;
  border-radius: 20px;
}

.status-badge.up {
  background: rgba(34, 197, 94, 0.12);
  color: #22c55e;
}

.status-badge.down {
  background: rgba(239, 68, 68, 0.12);
  color: #ef4444;
}

.footer {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #475569;
}
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap {{STATUS_CLASS}}">
    {{ICON}}
  </div>

  <div class="status">{{STATUS_TITLE}}</div>
  <div class="msg">{{STATUS_MSG}}</div>

  <div class="details">
    {{SERVICES}}
  </div>

  <div class="footer">
    <span>{{DATE}}</span>
    <span>Uptime Monitor</span>
  </div>
</div>

</body>
</html>

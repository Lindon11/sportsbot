<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; background: #07111f; font-family: Inter, Arial, sans-serif; color: #f5f7fb; padding: 40px; box-sizing: border-box; }
* { box-sizing: border-box; }
.status-card { width: 1000px; max-width: 100%; padding: 34px; background: linear-gradient(145deg, #101c2b, #081321); border: 1px solid #203247; border-radius: 26px; overflow: hidden; }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
.title { font-size: 30px; font-weight: 800; }
.subtitle { margin-top: 10px; font-size: 20px; color: #aeb8c8; }
.dot { display: inline-block; width: 18px; height: 18px; border-radius: 50%; background: #27d66b; margin-right: 12px; box-shadow: 0 0 18px #27d66b80; vertical-align: middle; }
.time { color: #aeb8c8; font-size: 18px; white-space: nowrap; }
.service { display: grid; grid-template-columns: 90px 210px minmax(0, 1fr) 160px; align-items: center; gap: 28px; padding: 26px; margin-bottom: 20px; background: #101d2c; border: 1px solid #22354c; border-radius: 22px; overflow: hidden; }
.icon { width: 64px; height: 64px; border-radius: 14px; background: #1b2a3c; display: flex; align-items: center; justify-content: center; font-size: 30px; }
.name { font-size: 24px; font-weight: 800; }
.bars { display: flex; gap: 8px; align-items: center; min-width: 0; }
.bar { flex: 1; max-width: 14px; min-width: 8px; height: 46px; border-radius: 10px; background: #27d66b; }
.bar.warn { background: #ffbf1a; }
.bar.down { background: #ff4d5a; }
.bar.none { background: #1b2a3c; }
.days { margin-top: 10px; color: #aeb8c8; font-size: 17px; }
.stats { min-width: 0; text-align: left; font-size: 20px; color: #aeb8c8; }
.percent { font-size: 26px; font-weight: 800; color: #27d66b; white-space: nowrap; }
.percent.warn { color: #ffbf1a; }
.percent.down { color: #ff4d5a; }
.status-dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: #27d66b; margin-right: 10px; vertical-align: middle; }
.status-dot.warn { background: #ffbf1a; }
.status-dot.down { background: #ff4d5a; }
.footer { border-top: 1px solid #203247; margin-top: 12px; padding-top: 22px; display: flex; justify-content: space-between; color: #aeb8c8; font-size: 20px; }
</style>
</head>
<body>
<div class="status-card">
  <div class="header">
    <div>
      <div class="title"><span class="dot"></span>System Status</div>
      <div class="subtitle">All systems operational</div>
    </div>
    <div class="time">{{DATE}}</div>
  </div>
  {{SERVICES}}
  <div class="footer">
    <div>🛡 Systems status</div>
    <div>Uptime Monitor</div>
  </div>
</div>
</body>
</html>

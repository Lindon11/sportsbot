<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 620px;
}

.card {
  --accent: #22e67b;
  --accent-soft: rgba(34, 230, 123, 0.13);
  --accent-border: rgba(34, 230, 123, 0.55);
  --accent-glow: rgba(34, 230, 123, 0.38);
  width: 1160px;
  min-height: 520px;
  padding: 74px 66px 58px;
  color: #f8fafc;
  background:
    radial-gradient(circle at 12% 0%, rgba(34, 230, 123, 0.08), transparent 36%),
    radial-gradient(circle at 88% 0%, var(--accent-soft), transparent 38%),
    linear-gradient(145deg, #06111d 0%, #08111f 54%, #030814 100%);
  border: 2px solid rgba(71, 85, 105, 0.62);
  border-top: 7px solid var(--accent);
  border-radius: 28px;
  box-shadow:
    0 0 32px var(--accent-glow),
    0 34px 100px rgba(0, 0, 0, 0.62),
    inset 0 0 34px rgba(148, 163, 184, 0.04);
  overflow: hidden;
  position: relative;
}

.card.down {
  --accent: #ff4f5e;
  --accent-soft: rgba(255, 79, 94, 0.13);
  --accent-border: rgba(255, 79, 94, 0.55);
  --accent-glow: rgba(255, 79, 94, 0.34);
}

.card:before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, var(--accent-glow), transparent 42px);
  opacity: 0.9;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 1;
}

.notice {
  display: inline-flex;
  align-items: center;
  gap: 20px;
  color: var(--accent);
  font-size: 29px;
  line-height: 1;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0;
}

.notice-dot {
  width: 17px;
  height: 17px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
}

.headline {
  margin-top: 34px;
  color: #f8fafc;
  font-size: 74px;
  line-height: 1.05;
  font-weight: 1000;
  letter-spacing: 0;
  text-shadow: 0 8px 28px rgba(0, 0, 0, 0.46);
}

.message {
  margin-top: 24px;
  max-width: 850px;
  color: #c7d0df;
  font-size: 30px;
  line-height: 1.38;
  font-weight: 650;
}

.service {
  margin-top: 50px;
  min-height: 164px;
  padding: 34px 44px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 34px;
  background: rgba(10, 18, 33, 0.7);
  border: 1px solid rgba(148, 163, 184, 0.22);
  border-radius: 22px;
  box-shadow: inset 0 0 28px rgba(148, 163, 184, 0.03);
}

.service-name {
  color: #f8fafc;
  font-size: 40px;
  line-height: 1.1;
  font-weight: 1000;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.service-url {
  margin-top: 16px;
  color: #9aa8bb;
  font-size: 27px;
  line-height: 1.2;
  font-weight: 650;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 18px;
  min-height: 64px;
  padding: 14px 32px;
  border-radius: 999px;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent-border);
  box-shadow: 0 0 22px rgba(0, 0, 0, 0.24);
  font-size: 31px;
  line-height: 1;
  font-weight: 950;
}

.status-badge .dot {
  width: 19px;
  height: 19px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}
</style>
</head>
<body>

<div class="card {{STATUS_CLASS}}">
  <div class="content">
    <div class="notice"><span class="notice-dot"></span>{{KICKER}}</div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="message">{{STATUS_MSG}}</div>

    <div class="service">
      <div>
        <div class="service-name">{{SERVICE_NAME}}</div>
        <div class="service-url">{{SERVICE_URL}}</div>
      </div>
      <div class="status-badge"><span class="dot"></span>{{STATE_LABEL}}</div>
    </div>
  </div>
</div>

</body>
</html>

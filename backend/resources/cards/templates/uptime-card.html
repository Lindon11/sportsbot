<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #07111f; font-family: 'Segoe UI', Arial, Helvetica, sans-serif; color: #f5f7fb; padding: 40px; }
.status-card { width: 700px; padding: 30px; background: linear-gradient(145deg, #101c2b, #081321); border: 1px solid #203247; border-radius: 26px; box-shadow: 0 24px 80px rgba(0,0,0,.28); }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.title { font-size: 24px; font-weight: 900; }
.subtitle { margin-top: 6px; font-size: 15px; color: #27d66b; font-weight: 600; }
.dot { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: #27d66b; margin-right: 10px; box-shadow: 0 0 18px #27d66b; }
.dot.down { background: #ff4d5a; box-shadow: 0 0 18px #ff4d5a; }
.time { color: #aeb8c8; font-size: 14px; }
.site { display: flex; align-items: center; gap: 16px; padding: 20px; background: rgba(16, 29, 44, .92); border: 1px solid #22354c; border-radius: 18px; }
.icon { width: 44px; height: 44px; border-radius: 12px; background: #1b2a3c; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.name { font-size: 18px; font-weight: 900; flex: 1; }
.badge { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; }
.badge.up { background: rgba(39,214,107,.15); color: #27d66b; }
.badge.down { background: rgba(255,77,90,.15); color: #ff4d5a; }
</style>
</head>
<body>
<div class="status-card">
  <div class="header">
    <div>
      <div class="title"><span class="dot {{STATUS_CLASS}}"></span>System Status</div>
      <div class="subtitle">{{STATUS_MSG}}</div>
    </div>
    <div class="time">{{DATE}}</div>
  </div>
  {{SERVICES}}
</div>
</body>
</html>

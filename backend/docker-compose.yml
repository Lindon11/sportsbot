services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /srv/laravelcp/backend
    ports:
      - '${APP_PORT:-8001}:80'
      - '${VITE_PORT:-5174}:${VITE_PORT:-5174}'
      - '${LARAVEL_WEBSOCKETS_PORT:-6002}:6002'
    volumes:
      - './:/srv/laravelcp/backend:cached'
    networks:
      - sail
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: '${APP_ENV:-local}'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: '${DB_DATABASE:-gangster_legends}'
      DB_USERNAME: '${DB_USERNAME:-dev}'
      DB_PASSWORD: '${DB_PASSWORD:-dev}'

  db:
    image: 'mysql:8.0'
    container_name: laravel_db
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-dev}'
      MYSQL_DATABASE: '${DB_DATABASE:-gangster_legends}'
      MYSQL_USER: '${DB_USERNAME:-dev}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-dev}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - 'sail-mysql:/var/lib/mysql'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-dev}"]
      retries: 3
      timeout: 5s

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_scheduler
    working_dir: /srv/laravelcp/backend
    entrypoint: []
    command: ["bash", "-c", "while true; do php artisan schedule:run --verbose --no-interaction 2>&1; sleep 60; done"]
    volumes:
      - './:/srv/laravelcp/backend:cached'
    networks:
      - sail
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: '${APP_ENV:-local}'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: '${DB_DATABASE:-gangster_legends}'
      DB_USERNAME: '${DB_USERNAME:-dev}'
      DB_PASSWORD: '${DB_PASSWORD:-dev}'
    restart: unless-stopped

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

.alert-card {
    position: relative;
    width: 1280px;
    height: 720px;
    background: url('file://{{ASSETS_DIR}}/bg_stadium.png') center/cover no-repeat;
    overflow: hidden;
}

/* Dark overlay */
.alert-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(1,10,25,0.15), rgba(1,10,25,0.55));
    z-index: 1;
}

/* Noise overlay */
.noise-overlay {
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/noise_overlay.png') center/cover no-repeat;
    opacity: 0.08;
    mix-blend-mode: overlay;
    z-index: 2;
    pointer-events: none;
}

/* Panel */
.panel {
    position: absolute;
    inset: 45px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index: 3;
    display: flex;
    flex-direction: column;
}

/* Panel background image */
.panel-bg {
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/panel_main.png') center/cover no-repeat;
    opacity: 0.12;
    border-radius: 28px;
    pointer-events: none;
}

/* Top bar */
.top-bar {
    margin: 26px 26px 0;
    height: 86px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    z-index: 4;
}

/* Header bar image overlay */
.top-bar::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/header_bar.png') center/cover no-repeat;
    opacity: 0.15;
    border-radius: 18px;
    pointer-events: none;
}

/* Goal badge */
.goal-badge {
    width: 340px;
    height: 100%;
    background: linear-gradient(135deg, {{ACCENT_DARK}}, {{ACCENT_MID}});
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0;
    text-shadow: 0 0 30px {{ACCENT}}66;
    position: relative;
    overflow: hidden;
    z-index: 5;
}

.goal-badge.long {
    font-size: 28px;
    letter-spacing: 0;
}

.goal-badge::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    border-radius: 18px;
}

/* Accent line under badge */
.accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: url('file://{{ASSETS_DIR}}/accent_line.png') center/cover no-repeat;
    opacity: 0.6;
}

/* League */
.league {
    flex: 1;
    text-align: left;
    font-size: 34px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    z-index: 5;
    padding: 0 24px;
    margin-left: 34px;
}

/* Minute pill */
.minute {
    margin-right: 20px;
    padding: 8px 28px;
    background: rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    font-size: 34px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
    z-index: 5;
    flex-shrink: 0;
}

/* Score area */
.score-area {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 40px;
    z-index: 4;
}

/* Badge */
.badge {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: rgba(4, 16, 38, 0.8);
    border: 2px solid rgba(20, 255, 180, 0.35);
    box-shadow: 0 0 40px rgba(20, 255, 180, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin: 0 auto;
    position: relative;
}

.badge img {
    width: 85%;
    height: 85%;
    object-fit: contain;
}

.badge-initials {
    font-size: 44px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.team-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
}

.team-name {
    font-size: 38px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

/* Score */
.score {
    text-align: center;
    padding: 0 30px;
    position: relative;
}

.score-glow {
    position: absolute;
    inset: -40px;
    background: url('file://{{ASSETS_DIR}}/score_glow.png') center/contain no-repeat;
    opacity: 0.35;
    pointer-events: none;
    z-index: -1;
}

.score-value {
    font-size: 132px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px {{ACCENT}}55, 0 0 120px {{ACCENT}}33;
    letter-spacing: 4px;
}

.score-value .dash {
    color: {{ACCENT}};
}

/* Live indicator */
.live {
    text-align: center;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.live-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: url('file://{{ASSETS_DIR}}/live_dot.png') center/cover no-repeat, {{ACCENT}};
    box-shadow: 0 0 12px {{ACCENT}}, 0 0 24px {{ACCENT}}88;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
}

.live-text {
    font-size: 24px;
    font-weight: 900;
    color: {{ACCENT}};
    letter-spacing: 3px;
    text-transform: uppercase;
}

/* Info card */
.info-card {
    margin: 0 26px 26px;
    padding: 20px 30px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 4;
    position: relative;
    overflow: hidden;
}

/* Info panel background */
.info-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('file://{{ASSETS_DIR}}/info_panel.png') center/cover no-repeat;
    opacity: 0.08;
    border-radius: 22px;
    pointer-events: none;
}

.info-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: {{ACCENT}};
    box-shadow: 0 0 12px {{ACCENT}}88;
    flex-shrink: 0;
}

.info-content {
    flex: 1;
    text-align: center;
}

.info-line {
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
}

.player-thumb {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    border: 2px solid rgba(18, 242, 163, 0.5);
    object-fit: cover;
    flex-shrink: 0;
}
</style>
</head>
<body>
<div class="alert-card">
    <div class="noise-overlay"></div>
    <div class="panel">
        <div class="panel-bg"></div>
        <div class="top-bar">
            <div class="goal-badge {{HEADLINE_CLASS}}">{{HEADLINE}}<div class="accent-line"></div></div>
            <div class="league">{{LEAGUE_NAME}}</div>
            <div class="minute">{{MINUTE}}</div>
        </div>

        <div class="score-area">
            <div class="team-col">
                <div class="badge">
                    {{HOME_BADGE_CONTENT}}
                </div>
                <div class="team-name">{{HOME_TEAM}}</div>
            </div>

            <div class="score">
                <div class="score-glow"></div>
                <div class="score-value">{{HOME_SCORE}} <span class="dash">-</span> {{AWAY_SCORE}}</div>
                <div class="live">
                    <div class="live-dot"></div>
                    <div class="live-text">{{LIVE_LABEL}}</div>
                </div>
            </div>

            <div class="team-col">
                <div class="badge">
                    {{AWAY_BADGE_CONTENT}}
                </div>
                <div class="team-name">{{AWAY_TEAM}}</div>
            </div>
        </div>

        <div class="info-card">
            <div class="info-icon"></div>
            <div class="info-content">
                {{DETAIL_LINES}}
            </div>
        </div>
    </div>
</div>
</body>
</html>

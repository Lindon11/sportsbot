<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    width: 1280px;
    height: 430px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    color: #f7fbff;
    background: #050914;
}

.card {
    position: relative;
    width: 1280px;
    height: 430px;
    overflow: hidden;
    background:
        linear-gradient(180deg, rgba(4, 8, 18, 0.46), rgba(3, 8, 17, 0.82)),
        url('file://{{ASSETS_DIR}}/bg.png') center/cover no-repeat;
}

.card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(115deg, {{ACCENT_SOFT}}, transparent 42%),
        url('file://{{ASSETS_DIR}}/noise_overlay.png') center/cover no-repeat;
    opacity: 0.72;
}

.frame {
    position: absolute;
    inset: 24px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 8px;
    background: rgba(9, 18, 31, 0.94);
    box-shadow:
        0 24px 70px rgba(0,0,0,0.52),
        inset 0 1px 0 rgba(255,255,255,0.08);
    overflow: hidden;
}

.content,
.telegram-card,
.hero {
    width: 100%;
    height: 100%;
}

.telegram-card {
    background: #0b1624;
}

.hero {
    position: relative;
    overflow: hidden;
    background:
        linear-gradient(180deg, rgba(2,9,21,0.18), rgba(2,9,21,0.86)),
        linear-gradient(90deg, rgba(0,0,0,0.80), transparent 45%, rgba(0,0,0,0.84)),
        url('file://{{ASSETS_DIR}}/bg_stadium.png') center/cover no-repeat;
}

.hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(180deg, transparent 52%, rgba(0,0,0,0.48)),
        radial-gradient(circle at 50% 10%, {{ACCENT_SOFT}}, transparent 46%);
    pointer-events: none;
}

.hero-badge,
.hero-clock,
.hero-league,
.teams-row,
.solo-feature {
    position: absolute;
    z-index: 2;
}

.hero-badge {
    left: 22px;
    top: 20px;
    max-width: 292px;
    height: 52px;
    padding: 14px 22px;
    border-radius: 8px;
    background: linear-gradient(135deg, {{ACCENT}}, rgba(255,255,255,0.84));
    color: #06111f;
    font-size: 24px;
    line-height: 1;
    font-weight: 950;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 10px 26px rgba(0,0,0,0.34);
}

.is-live .hero-badge {
    color: #ffffff;
    background: linear-gradient(135deg, #ee1f2f, #ff5260);
}

.is-result .hero-badge {
    color: #ffffff;
    background: linear-gradient(135deg, #0fae59, #24d777);
}

.hero-clock {
    right: 22px;
    top: 20px;
    min-width: 72px;
    height: 52px;
    padding: 14px 17px;
    border-radius: 8px;
    background: rgba(255,255,255,0.13);
    color: #ffffff;
    text-align: center;
    font-size: 24px;
    line-height: 1;
    font-weight: 950;
    white-space: nowrap;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
}

.hero-league {
    left: 330px;
    right: 330px;
    top: 28px;
    color: #ffffff;
    font-size: 24px;
    line-height: 1.05;
    font-weight: 950;
    letter-spacing: 0;
    text-align: center;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 2px 18px rgba(0,0,0,0.7);
}

.teams-row {
    left: 58px;
    right: 58px;
    bottom: 24px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 300px minmax(0, 1fr);
    align-items: end;
    gap: 34px;
}

.team-block {
    min-width: 0;
    display: grid;
    justify-items: center;
    gap: 13px;
    text-align: center;
}

.club-logo {
    width: 146px;
    height: 146px;
    padding: 12px;
    object-fit: contain;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 999px;
    background: rgba(4,16,34,0.48);
    filter: drop-shadow(0 16px 22px rgba(0,0,0,0.60));
}

.club-logo.fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    color: {{ACCENT}};
    font-size: 40px;
    font-weight: 950;
}

.logo-hidden {
    display: none !important;
}

.team-block h2 {
    width: 100%;
    max-height: 80px;
    overflow: hidden;
    color: #ffffff;
    font-size: 33px;
    line-height: 1.08;
    font-weight: 950;
    text-transform: uppercase;
    overflow-wrap: anywhere;
    text-shadow: 0 3px 18px rgba(0,0,0,0.76);
}

.score-block {
    min-height: 172px;
    display: grid;
    align-content: center;
    justify-items: center;
    text-align: center;
    gap: 8px;
}

.score-block > span {
    color: #ffffff;
    font-size: 19px;
    line-height: 1;
    font-weight: 950;
    text-transform: uppercase;
    text-shadow: 0 2px 16px rgba(0,0,0,0.72);
}

.scoreline {
    display: grid;
    grid-template-columns: 1fr 42px 1fr;
    align-items: center;
    justify-items: center;
    min-width: 282px;
    color: #ffffff;
    font-size: 96px;
    line-height: 0.95;
    font-weight: 950;
    text-shadow: 0 10px 26px rgba(0,0,0,0.62);
}

.scoreline span {
    font-size: 96px;
    line-height: 0.95;
    font-weight: 950;
}

.scoreline i {
    color: rgba(255,255,255,0.74);
    font-size: 66px;
    font-style: normal;
}

.versus-mark {
    color: #ffffff;
    font-size: 84px;
    line-height: 0.95;
    font-weight: 950;
    text-shadow: 0 10px 26px rgba(0,0,0,0.68);
}

.kickoff-time {
    color: {{ACCENT}};
    font-size: 48px;
    line-height: 1;
    font-weight: 950;
    text-shadow: 0 7px 24px rgba(0,0,0,0.62);
}

.solo-hero {
    display: block;
}

.solo-feature {
    left: 74px;
    right: 74px;
    bottom: 58px;
    display: grid;
    grid-template-columns: 170px minmax(0, 1fr);
    gap: 32px;
    align-items: center;
}

.solo-feature h2 {
    max-height: 126px;
    overflow: hidden;
    color: #ffffff;
    font-size: 54px;
    line-height: 1.08;
    font-weight: 950;
    overflow-wrap: anywhere;
    text-shadow: 0 4px 22px rgba(0,0,0,0.78);
}

.solo-feature p {
    margin-top: 14px;
    color: #d8e1ed;
    font-size: 26px;
    line-height: 1.12;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.empty-card {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a8b7ca;
    font-size: 28px;
    font-weight: 800;
}
</style>
</head>
<body>
<div class="card">
    <div class="frame">
        <main class="content">
            {{ROWS}}
        </main>
    </div>
</div>
</body>
</html>
